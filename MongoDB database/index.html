<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    h2 { margin-bottom: 20px; }
    label { display: block; margin-bottom: 4px; font-weight: bold; }
    input, textarea {
      width: 300px; padding: 8px; margin-bottom: 16px;
      border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
    }
    textarea { height: 100px; resize: vertical; }
    button {
      padding: 10px 24px; background: #333; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #555; }
    #response { margin-top: 16px; font-size: 14px; color: green; }
  </style>
</head>
<body>

  <h2>Contact Form</h2>

  <label>Name:</label>
  <input type="text" id="name" placeholder="Your name" />

  <label>Email:</label>
  <input type="email" id="email" placeholder="your@email.com" />

  <label>Message:</label>
  <textarea id="message" placeholder="Your message..."></textarea>

  <button onclick="submitForm()">Submit</button>
  <p id="response"></p>

  <script>
    async function submitForm() {
      const name    = document.getElementById('name').value.trim();
      const email   = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      const resp    = document.getElementById('response');

      if (!name || !email || !message) {
        resp.style.color = 'red';
        resp.textContent = 'Please fill in all fields.';
        return;
      }

      try {
        const res = await fetch('http://localhost:3000/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message })
        });
        const data = await res.json();
        if (data.success) {
          resp.style.color = 'green';
          resp.textContent = '✅ Message submitted successfully!';
          document.getElementById('name').value    = '';
          document.getElementById('email').value   = '';
          document.getElementById('message').value = '';
        } else {
          resp.style.color = 'red';
          resp.textContent = '❌ Error: ' + data.error;
        }
      } catch (err) {
        resp.style.color = 'red';
        resp.textContent = '❌ Could not connect to server.';
      }
    }
  </script>

</body>
</html>
